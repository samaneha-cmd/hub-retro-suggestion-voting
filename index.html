<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hub Retro - Voting Mind Map</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #ffffff;
  background-image: radial-gradient(ellipse at 20% 10%, rgba(99,195,209,0.08) 0%, transparent 50%),
                    radial-gradient(ellipse at 80% 90%, rgba(124,110,176,0.08) 0%, transparent 50%);
  font-family: Arial, sans-serif;
  color: #241E46;
  min-height: 100vh;
}

header {
  display: flex; align-items: center; justify-content: center;
  padding: 20px 24px; gap: 20px;
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(124,110,176,0.2);
}
header img { height: 44px; width: auto; object-fit: contain; }
header h1 { font-size: 20px; color: #7C6EB0; letter-spacing: 0.5px; font-weight: 600; }

.vote-counter {
  text-align: center; padding: 14px;
  font-size: 15px; color: #7C6EB0;
  background: rgba(124,110,176,0.06);
  border-bottom: 1px solid rgba(124,110,176,0.15);
  letter-spacing: 0.3px;
}
.vote-counter span { font-weight: bold; font-size: 18px; color: #241E46; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  grid-auto-rows: 1fr;
  gap: 16px;
  padding: 28px;
  max-width: 1300px;
  margin: 0 auto;
  align-items: stretch;
}

/* Glassmorphism card */
.card {
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border: 1px solid rgba(124,110,176,0.25);
  border-radius: 16px;
  padding: 16px;
  cursor: pointer;
  position: relative;
  display: flex;
  flex-direction: column;
  box-shadow: 0 4px 20px rgba(124,110,176,0.1), inset 0 1px 0 rgba(255,255,255,0.9);
  transition: background 0.5s ease, border-color 0.5s ease, box-shadow 0.5s ease, transform 0.4s ease;
}
.card:hover {
  background: rgba(255,255,255,0.85);
  border-color: rgba(99,195,209,0.5);
  box-shadow: 0 8px 32px rgba(99,195,209,0.2), inset 0 1px 0 rgba(255,255,255,1);
  transform: translateY(-2px);
}
.card.voted {
  border-color: rgba(99,195,209,0.6);
  background: rgba(99,195,209,0.08);
  box-shadow: 0 4px 20px rgba(99,195,209,0.15), inset 0 1px 0 rgba(255,255,255,0.9);
}

.card .name {
  font-size: 11px; color: #63C3D1; margin-bottom: 6px;
  font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
}
.card .title {
  font-size: 13px; color: #241E46; font-weight: 600;
  line-height: 1.4;
}

.card .spacer { flex: 1; }

.card .details {
  opacity: 1;
  margin-top: 12px;
  font-size: 12px;
  color: rgba(36,30,70,0.65);
  line-height: 1.5;
  border-top: 1px solid rgba(124,110,176,0.2);
  padding-top: 12px;
}
.card .details .label {
  color: #7C6EB0; font-weight: 700; font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.8px;
  margin-top: 10px; margin-bottom: 3px;
}
.card .details .label:first-child { margin-top: 0; }

.card .vote-btn {
  margin-top: 14px;
  width: 100%;
  padding: 9px;
  background: rgba(124,110,176,0.15);
  border: 1px solid rgba(124,110,176,0.35);
  border-radius: 10px;
  color: #7C6EB0;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.3px;
  transition: background 0.4s ease, border-color 0.4s ease, color 0.3s ease;
}
.card .vote-btn:hover {
  background: rgba(99,195,209,0.15);
  border-color: rgba(99,195,209,0.5);
  color: #3aa8b8;
}
.card.voted .vote-btn {
  background: rgba(99,195,209,0.15);
  border-color: rgba(99,195,209,0.5);
  color: #2d9aaa;
  font-weight: 700;
}
.card.voted .vote-btn::before { content: "✓  "; }

.card .vote-count {
  position: absolute; top: 12px; right: 12px;
  background: rgba(99,195,209,0.15);
  border: 1px solid rgba(99,195,209,0.4);
  color: #3aabb8;
  border-radius: 50%; width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
}
.card .vote-count.zero {
  background: rgba(124,110,176,0.08);
  border-color: rgba(124,110,176,0.2);
  color: rgba(124,110,176,0.5);
}

/* Name input bar */
.name-bar {
  display: flex; align-items: center;
  gap: 10px; margin-top: 8px;
}
.name-bar label {
  font-size: 13px; font-weight: 600; color: #7C6EB0; white-space: nowrap;
}
.name-bar input {
  padding: 7px 12px;
  border: 1px solid rgba(124,110,176,0.4);
  border-radius: 10px;
  font-size: 13px;
  color: #241E46;
  background: rgba(255,255,255,0.8);
  outline: none;
  width: 200px;
  transition: border-color 0.3s ease, box-shadow 0.3s ease;
}
.name-bar input:focus {
  border-color: #63C3D1;
  box-shadow: 0 0 0 3px rgba(99,195,209,0.15);
}
.name-bar input::placeholder { color: rgba(36,30,70,0.35); }

.card .vote-btn:disabled {
  opacity: 0.35; cursor: not-allowed;
}

.disclaimer {
  text-align: center;
  padding: 10px 24px;
  font-size: 13px;
  color: #7C6EB0;
  background: rgba(124,110,176,0.05);
  border-bottom: 1px solid rgba(124,110,176,0.1);
}

#submitBtn {
  padding: 8px 20px;
  background: #7C6EB0;
  border: none;
  border-radius: 10px;
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.3s ease, transform 0.2s ease;
  letter-spacing: 0.3px;
}
#submitBtn:hover:not(:disabled) { background: #241E46; transform: translateY(-1px); }
#submitBtn:disabled { opacity: 0.35; cursor: not-allowed; }
</style>
</head>
<body>

<header>
  <img src="bugloos-logo.png" alt="Bugloos"
       onerror="this.onerror=null; this.src='https://bugloos.com/wp-content/uploads/2026/02/Bugloos-Logo-light.png';">
  <div>
    <h1>Hub Retro Improvement Suggestions</h1>
    <div class="name-bar">
      <label for="voterName">First &amp; Last Name:</label>
      <input type="text" id="voterName" placeholder="Enter your full name to vote…" autocomplete="off">
    </div>
  </div>
</header>

<div class="vote-counter">
  <span id="remaining">Each person has 2 votes total</span> &nbsp;·&nbsp;
  <button id="submitBtn" onclick="submitVotes()" disabled>Submit Votes</button>
</div>
<div class="disclaimer">
  💡 If you have any questions about a suggestion, please reach out directly to the person who submitted it.
</div>

<div class="grid" id="grid"></div>

<script>
const items = [
  {
    name: "Ashkan Tofangdar",
    title: "Implement a Weekly Knowledge Sharing Mechanism",
    description: "Establish a centralized knowledge base and sharing routine where team members share their weekly learnings. Highlight new tools, troubleshoot experiences, and share valuable insights so the whole team benefits.",
    role: "Help research and set up the initial platform or template. Commit to sharing own learnings weekly and summarizing submissions for the first month."
  },
  {
    name: "Fatemeh Cheraghi",
    title: "Brain AI / Team 3 Hootan and...",
    description: "The idea is good for our company and situation of product and projects. Help us to save time.",
    role: "Test the product, see the result how can be useable."
  },
  {
    name: "Taha Safari",
    title: "Time",
    description: "Since we have heavy working weeks and workload, giving this kind of activity an extra day would be great. Like having it in Thursdays to have some time off.",
    role: "Nothing really."
  },
  {
    name: "Mostafa Shaban",
    title: "Install Claude on all projects",
    description: "Onboard developers on how to use Claude inside the codes. Since Ashkan installed Claude on Urbansofa Front, we experienced a huge impact: 2.82h logged, 7h billed. Every triage, bug fix, feature implementation, and technical debt can be properly handled.",
    role: "Gathering non-technical documents of the project to be included in Claude's knowledge base."
  },
  {
    name: "Mostafa Shaban",
    title: "Small team circles inside the HUB",
    description: "Instead of one person for 14 hub members, separate 14 people in groups of 3-4 members. Each proposes their strategy to act as a company with a long-term business plan. Teams sit next to each other physically.",
    role: "Maybe share my ideas and be part of it."
  },
  {
    name: "Alireza Basij",
    title: "WordPress Related Product",
    description: "Create a product based on WordPress (theme or plugin). Sell as custom or place on popular WordPress marketplaces such as ThemeForest.",
    role: "I can produce this product very quickly with the help of artificial intelligence."
  },
  {
    name: "Alireza Basij",
    title: "Applying AI in the product manufacturing process",
    description: "The Hackathon showed it is possible to produce a quality product in very short time, even with zero coding. This can be applied to production of customized products for the company.",
    role: "Do the product architecture, create an initial prototype with AI, build with React frontend and Node.js backend."
  },
  {
    name: "Parya Ardalani",
    title: "Agent for Projects",
    description: "Train agent for projects, shared between team members. All chats go in one channel to have one main source instead of each person separately.",
    role: "Test it to see how close the result is with expectations, train it on complex test cases."
  },
  {
    name: "Taha Safari",
    title: "We need a product group",
    description: "Product is a connection between business and tech, and here we do not really follow that. We need to make a separate product team, set priorities, and have a leader in that team.",
    role: "I could lead it, facilitate it, or just be a part of it. I have done all the parts before."
  },
  {
    name: "Taha Safari",
    title: "Spotify Model Inside the Hub",
    description: "If inside the hub we build a small Spotify model, we can achieve so much more. Make people more aligned around a value (product/project). Must be paired with a RACI model.",
    role: "I can help to build it. I have experience in doing this kind of transitions."
  },
  {
    name: "Nayyer Jafari",
    title: "AI-Driven Product Development Flow Team",
    description: "Create a dedicated team to explore and implement new tools and AI-based approaches, designing a unified product development flow from design through frontend and backend. Scalable, controllable, and optimized.",
    role: "As an Enabling team member, review generated code and workflows, verify the end-to-end flow, ensure AI-based suggestions are properly integrated."
  },
  {
    name: "Nayyer Jafari",
    title: "Project Prioritization and Developer Capacity Planning",
    description: "Identify the priority of each project and allocate developer work according to their limited time and capacity. Ensures high-priority projects receive the necessary focus.",
    role: "Identify which developer is best suited for each project type based on skills, strengths, and previous contributions."
  },
  {
    name: "Vahid Sarhhadi",
    title: "All developers should become full-stack",
    description: "All developers become full-stack; they can have more control over one area but can comment on the entire app. Reduces the problem of some being busy and some being empty.",
    role: "I can play a pivotal role in this change process."
  }
];

let votes = new Set();
const MAX_VOTES = 2;

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyUO6JQ7O0aPqxuMdlTMAOwD3nJaWkxJ2sC-AX4ex_xfl_aiHUfcdqxACBsa2iKR4BNFg/exec';

function getVoterName() {
  return document.getElementById('voterName').value.trim();
}

function updateCounter() {
  const used = votes.size;
  const el = document.getElementById('remaining');
  el.textContent = used === 0 ? `Each person has ${MAX_VOTES} votes total` : used === MAX_VOTES ? 'Both votes used ✓' : `${MAX_VOTES - used} vote remaining`;
  updateSubmitBtn();
}

function updateSubmitBtn() {
  const btn = document.getElementById('submitBtn');
  btn.disabled = votes.size === 0 || !getVoterName();
}

function submitVotes() {
  const name = getVoterName();
  if (!name || votes.size === 0) return;

  const btn = document.getElementById('submitBtn');
  btn.textContent = 'Submitting…';
  btn.disabled = true;

  const votedItems = [...votes].map(i => ({
    timestamp: new Date().toLocaleString(),
    voterName: name,
    submitter: items[i].name,
    title: items[i].title,
    action: 'voted'
  }));

  Promise.all(votedItems.map(row =>
    fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify(row)
    })
  )).then(() => {
    btn.textContent = '✓ Submitted!';
    btn.style.background = '#63C3D1';
    btn.style.color = '#241E46';
    document.querySelectorAll('.vote-btn').forEach(b => b.disabled = true);
    document.getElementById('voterName').disabled = true;
  }).catch(() => {
    btn.textContent = 'Submit Votes';
    btn.disabled = false;
    alert('Submission failed. Please try again.');
  });
}

document.getElementById('voterName').addEventListener('input', () => { render(); updateSubmitBtn(); });

function render() {
  const hasName = getVoterName().length > 0;
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  items.forEach((item, i) => {
    const isVoted = votes.has(i);
    const count = item.votes || 0;
    const div = document.createElement('div');
    div.className = 'card' + (isVoted ? ' voted' : '');
    div.innerHTML = `
      <div class="vote-count ${count === 0 ? 'zero' : ''}">${count}</div>
      <div class="name">${item.name}</div>
      <div class="title">${item.title}</div>
      <div class="details">
        <div class="label">Description</div>
        <div>${item.description}</div>
        <div class="label">Their role</div>
        <div>${item.role}</div>
      </div>
      <div class="spacer"></div>
      <button class="vote-btn" ${!hasName ? 'disabled title="Enter your full name first"' : ''}>${isVoted ? 'Voted' : 'Vote'}</button>
    `;
    div.querySelector('.vote-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      const name = getVoterName();
      if (!name) return;
      if (isVoted) {
        votes.delete(i);
        item.votes = Math.max(0, count - 1);
      } else {
        if (votes.size >= MAX_VOTES) {
          alert(`You only have ${MAX_VOTES} votes. Remove a vote to change your choice.`);
          return;
        }
        votes.add(i);
        item.votes = count + 1;
      }
      updateCounter();
      render();
    });
    grid.appendChild(div);
  });
}

render();
updateCounter();
</script>
</body>
</html>
